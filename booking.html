<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>SAFARICA Booking</title>
</head>

<body >
  <nav class="p-4 flex items-center md:justify-around mx-auto relative z-10 bg-white shadow-lg rounded-lg">
    <a href="index.html"><img src="Img/safari logo.png" alt="SAFARICA" class="w-[120px] lg:w-[120px]"></a>
    <img src="Img/Burger menu.png" alt="Burger menu" class="pe-3 ms-auto w-9 h-8 md:hidden cursor-pointer transition-transform transform hover:scale-105" id="burgerMenu">

    <!-- Desktop Navigation Items -->
    <div class="hidden md:flex md:mx-auto" id="navItems">
        <ul class="flex space-x-9 font-semibold text-gray-700">
            <li class="hover:text-orange-400 transition-colors duration-200 text-[16px]"><a href="About.html">About us</a></li>
            <li class="relative group">
                <button id="dropdownButton" class="flex items-center hover:text-orange-400 transition-colors duration-200 text-[16px] focus:outline-none">
                    Our Plans
                    <svg class="w-4 h-4 ml-1 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <ul id="dropdownMenu" class="absolute left-0 hidden mt-2 w-40 bg-white shadow-lg rounded-lg z-50 group-hover:block">
                    <li class="hover:bg-gray-100 transition-colors duration-200"><a href="summer.html"  class="block px-4 py-2 text-gray-800">Summer Plan</a></li>
                    <li class="hover:bg-gray-100 transition-colors duration-200"><a href="winter.html"  class="block px-4 py-2 text-gray-800">Winter Plan</a></li>
                </ul>
            </li>
            <li class="hover:text-orange-400 transition-colors duration-200 text-[16px]"><a href="contact.html">Contact</a></li>
            <li class="hover:text-orange-400 transition-colors duration-200 text-[16px]"><a href="profile.html">Profile</a></li>
        </ul>
    </div>

    <!-- Mobile Navigation Items -->
    <div class="absolute top-16 right-0 w-full bg-white shadow-lg rounded-lg md:hidden hidden" id="mobileNavItems">
        <ul class="flex flex-col space-y-2 p-4 font-semibold">
            <li class="hover:text-orange-400 transition-colors duration-200 text-[16px]"><a href="About.html">About us</a></li>
            <li class="relative group">
                <button id="mobileDropdownButton" class="flex items-center hover:text-orange-400 transition-colors duration-200 text-[16px] focus:outline-none">
                    Our Plans
                    <svg class="w-4 h-4 ml-1 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <ul id="mobileDropdownMenu" class="absolute left-0 hidden mt-2 w-40 bg-white shadow-lg rounded-lg z-50">
                    <li class="hover:bg-gray-100 transition-colors duration-200"><a href="summer.html"  class="block px-4 py-2 text-gray-800">Summer Plan</a></li>
                    <li class="hover:bg-gray-100 transition-colors duration-200"><a href="winter.html"  class="block px-4 py-2 text-gray-800">Winter Plan</a></li>
                </ul>
            </li>
            <li class="hover:text-orange-400 transition-colors duration-200 text-[16px]"><a href="contact.html">Contact</a></li>
            <li class="hover:text-orange-400 transition-colors duration-200 text-[16px]"><a href="profile.html">Profile</a></li>
        </ul>
    </div>
</nav>

    <div class="relative flex flex-col justify-center items-center border bg-gray-50 mt-10">
        <img src="Img/tunis.jpg" alt="Mountain" class="w-full h-[900px] object-cover">  
      
        <div class="absolute inset-0 flex justify-center items-center">
          <div class="container flex flex-col justify-center mx-auto md:flex-row items-center space-y-2 md:space-x-2 md:space-y-0 py-2 bg-blue-200 bg-opacity-75 rounded-md">
            
            <!-- Location Input -->
            <div class="relative flex items-center border rounded-md p-2 bg-white w-full md:w-1/3">
              <span class="material-icons text-gray-500">hotel</span>
              <select class="ml-2 outline-none w-full cursor-pointer border rounded-md p-1" id="planSelect">
                <option value="" disabled selected>Select Your Plan</option>
                <option value="winter">Winter Plan</option>
                <option value="summer">Summer Plan</option>
              </select>
            </div>
      
            <!-- Check-in and Check-out -->
            <div class="flex items-center border rounded-md p-2 bg-white w-full md:w-1/3">
              <span class="material-icons text-gray-500">calendar_today</span>
              <div class="ml-2 flex flex-col md:flex-row md:space-x-2 w-full">
                <div class="flex flex-col w-full md:w-1/2">
                  <input type="date" class="outline-none w-full border rounded-md p-1" id="checkin">
                </div>
                <div class="flex flex-col w-full md:w-1/2">
                  <input type="date" class="outline-none w-full border rounded-md p-1" id="checkout">
                </div>
              </div>
            </div>
      
            <!-- Guests and Room Selection -->
            <div class="relative flex items-center border rounded-md p-2 bg-white w-full md:w-1/4" id="guest-room-dropdown">
              <span class="material-icons text-gray-500">person</span>
              <input type="text" value="2 adults · 0 children · 1 room" class="ml-2 outline-none w-full cursor-pointer" id="guestRoomInput" readonly>
      
              <!-- Dropdown -->
              <div class="absolute top-full left-0 mt-2 w-full bg-white border rounded-md p-4 hidden" id="guestRoomDropdownContent">
                <div class="flex justify-between">
                  <label for="adults">Adults</label>
                  <input type="number" id="adults" value="2" min="1" max="10" class="w-12 text-center border">
                </div>
                <div class="flex justify-between mt-2">
                  <label for="children">Children</label>
                  <input type="number" id="children" value="0" min="0" max="10" class="w-12 text-center border">
                </div>
                <div class="flex justify-between mt-2">
                  <label for="rooms">Rooms</label>
                  <input type="number" id="rooms" value="1" min="1" max="10" class="w-12 text-center border">
                </div>
                <button class="mt-2 bg-blue-500 text-white py-1 px-2 rounded-md" id="applyGuests">Apply</button>
              </div>
            </div>
      
            <!-- Search Button -->
            <button id="nextPayment" class="bg-blue-500 text-white p-2 rounded-md w-full md:w-auto">Proceed</button>
          </div>
        </div>
      </div>
      
      <script src="script.js">
    </script>
      
      
</body>

</html>
